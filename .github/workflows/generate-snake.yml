name: Generate Snake

on:
  # Запуск по расписанию: каждый день в полночь (00:00)
  schedule:
    - cron: "0 0 * * *"
  
  # Позволяет запустить робота вручную одной кнопкой во вкладке Actions
  workflow_dispatch:
  
  # Запуск при каждом пуше в ветку main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Генерирует змейку на основе твоих коммитов
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: b4631119-oss
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Сохраняет сгенерированные SVG картинки в специальную ветку output, чтобы они не засоряли основную ветку
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}